[workspace]
authors = ["luckyjim <jcolley@lpnhe.in2p3.fr>"]
channels = ["conda-forge"]
name = "bind_template"
platforms = ["linux-64"]
version = "0.1.0"

[tasks]

[feature.runtime.dependencies]
nanobind = ">=2.13.0,<3"
python = ">=3.14.6,<3.15"
ipython = ">=9.15.0,<10"
pip = ">=26.1.2,<27"
numpy = ">=2.5.0,<3"
scipy = ">=1.18.0,<2"

[feature.test.dependencies]
pytest = "*"

[feature.test.tasks]
test_unit = "pip install -e . && pytest -v tests/unit"

[feature.lint.dependencies]
ruff = "*"


[environments]
default = { features = ["runtime"] }
quality = { features = ["runtime","test","lint"] }